<!DOCTYPE html>
<html>
<head>
  <title>Sign In</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; }
    .login-form { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 300px; }
    h1 { text-align: center; color: #333; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: bold; }
    input[type="text"], input[type="password"], input[type="hidden"] { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
    input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: #007bff; }
    button { width: 100%; padding: 0.75rem; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="login-form">
    <h1>Sign In</h1>
    <form method="POST" action="/authorize">
      <input type="hidden" name="client_id" value="{{ .client_id }}">
      <input type="hidden" name="redirect_uri" value="{{ .redirect_uri }}">
      <input type="hidden" name="state" value="{{ .state }}">
      <input type="hidden" name="scope" value="{{ .scope }}">
      <input type="hidden" name="response_type" value="code">

      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
